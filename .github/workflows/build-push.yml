name: Build and Push Docker Images

on:
  push:
    branches:
      - main
    paths:
      - 'python-app/**'
      - 'go-app/**'

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Downcase REPO
        run: |
          echo "REPO=${GITHUB_REPOSITORY_OWNER,,}" >>${GITHUB_ENV}

      - name: Build and push Python App image
        uses: docker/build-push-action@v5
        with:
          context: ./python-app
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.REPO }}/python-app:latest

      - name: Build and push Go App image
        uses: docker/build-push-action@v5
        with:
          context: ./go-app
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.REPO }}/go-app:latest
