global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'python-app'
    static_configs:
      - targets: ['python-app:8000']

  - job_name: 'go-app'
    static_configs:
      - targets: ['go-app:8080']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
